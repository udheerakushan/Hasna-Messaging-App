def localProperties = new File(rootDir.parentFile, 'local.properties')
def flutterRoot = localProperties.exists() ? localProperties.text.split('flutter.sdk=')[1].split('\n')[0] : null
def flutterSdk = flutterRoot ? new File(flutterRoot) : null

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    namespace "com.hasna.messaging_app"
    compileSdkVersion 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11.toString()
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.hasna.messaging_app"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode flutterVersionCode?.toInteger() ?: 1
        versionName flutterVersionName ?: '1.0.0'
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
}
